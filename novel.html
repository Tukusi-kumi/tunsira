<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>小説 - ツンしら公式サイト</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Noto+Sans+JP:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body class="min-h-screen bg-light">
  <!-- Main Content -->
  <main class="container mx-auto px-4 pt-20 pb-8">
    <!-- Episode Navigation -->
    <div class="flex items-center justify-between mb-6">
      <button id="prevBtn" class="modern-button flex items-center gap-2" disabled>
        <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <polyline points="15 18 9 12 15 6"></polyline>
        </svg>
        前の話
      </button>

      <div class="text-center">
        <div class="inline-block bg-gradient-to-r from-primary to-secondary text-white px-6 py-3 rounded-full mb-2">
          <h2 id="episodeTitle" class="text-lg font-bold"></h2>
        </div>
        <div class="flex gap-2 justify-center" id="episodeIndicators">
          <!-- Indicators will be generated by JavaScript -->
        </div>
      </div>

      <button id="nextBtn" class="modern-button flex items-center gap-2">
        次の話
        <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <polyline points="9 18 15 12 9 6"></polyline>
        </svg>
      </button>
    </div>

    <!-- Novel Content -->
    <div class="max-w-3xl mx-auto">
      <div class="modern-card p-8 sm:p-12">
        <div id="novelContent" class="novel-text">
          <!-- Novel content will be generated by JavaScript -->
        </div>
      </div>

      <!-- Action Buttons -->
      <div class="flex justify-center gap-4 mt-8">
        <a href="index.html">
          <button class="modern-button flex items-center gap-2">
            <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"></path>
              <polyline points="9 22 9 12 15 12 15 22"></polyline>
            </svg>
            トップページへ
          </button>
        </a>
      </div>
    </div>
  </main>

  <script src="novel.js"></script>
</body>
</html>
