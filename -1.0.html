<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>プロローグ</title>

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body{
    margin:0;
    background:#f7f7f7;
    font-family:"MS PGothic", sans-serif;
    color:#222;
    line-height:1.8;
}

/* 本文エリア */
.wrapper{
    max-width:720px;
    margin:auto;
    padding:40px 20px;
    background:white;
    min-height:100vh;
}

/* タイトル */
h1{
    margin-bottom:40px;
}

/* 小説本文 */
.novel{
    font-size:18px;
    letter-spacing:0.03em;
}

/* スマホ対応 */
@media (max-width:768px){
    .wrapper{
        padding:25px 15px;
    }

    .novel{
        font-size:17px;
    }
}
</style>
</head>

<body>

<div class="wrapper">

<h1>プロローグ</h1>

<div class="novel">
<p>道の端に落ちていたのは、赤いリボンだった。</p>
<p>そのリボンには、黄色で小さいボタンがついていた。</p>
<p>気になったのでそのボタンを押した。</p>
<p>カチッと音がなった。</p>
<p>だが何も変化が起こらない。</p>
<p>「なんだ何も変わらないじゃん」</p>
<p>...！？声が高くなってる？</p>
<p>一度、深呼吸をして</p>
<p>「あー」</p>
<p>確かに声が高い。</p>
<p>...あっ、そうだ顔はどうなってるんだ？</p>
<p>水たまりのほうに寄った。</p>
<p>！？可愛らしい少女が映っていた。</p>
<p>心臓がドキッと跳ねた。</p>
<p>驚きと同時に、なぜか嫌じゃないと言う気持ちが生まれた。</p>
<p>「このリボンすげぇ！」</p>
<p>そのリボンをポケットにしまった。</p>
<p>明日から楽しみだな。</p>
</div>

</div>

</body>
</html>
