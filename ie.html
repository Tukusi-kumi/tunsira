<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>えぇ（困惑）</title>
</head>
<body>

    <audio id="myAudio" src="my.wav" loop controls></audio>
    
    <script>
        // アラートを出す
        alert("何もないよんっ");

        // アラートを閉じた後に音声を再生する
        const audio = document.getElementById('myAudio');
        audio.play().catch(error => {
            console.log("自動再生がブロックされました。再生ボタンを押してください。");
        });
    </script>

</body>
</html>
