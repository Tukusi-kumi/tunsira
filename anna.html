<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  
  <style>
    *{ box-sizing:border-box; }

    body{
      font-family:"MS PGothic", "Hiragino Kaku Gothic ProN", sans-serif;
      text-align:center;
      margin:0;
      padding:0;
      background: radial-gradient(circle at top, #fff7fb, #ffeef0, #f5f5ff);
      min-height:100vh;
      -webkit-text-size-adjust:100%;
    }

    /* ===== ロード画面 ===== */
    .loader-overlay{
      position:fixed;
      inset:0;
      width:100%;
      height:100%;
      background:linear-gradient(135deg, #fff5fa 0%, #ffe8f0 50%, #f0e8ff 100%);
      display:flex;
      flex-direction:column;
      align-items:center;
      justify-content:center;
      z-index:9999;
      transition:opacity 0.6s ease-out;
    }
    .loader-overlay.hide{
      opacity:0;
      pointer-events:none;
    }

    .loader-text{
      font-size:clamp(16px, 4.5vw, 18px);
      color:#cc6699;
      margin-top:16px;
      letter-spacing:0.1em;
    }

    .loader-spinner{
      width:40px;
      height:40px;
      border:3px solid #ffc9dd;
      border-top-color:#cc6699;
      border-radius:50%;
      animation:spin 0.8s linear infinite;
    }
    @keyframes spin{ to{ transform:rotate(360deg); } }

    .main-content{
      opacity:0;
      transition:opacity 0.5s ease-out;
    }
    .main-content.show{ opacity:1; }

    .wrapper{
      width:90%;
      max-width:600px;
      margin:24px auto;
      padding:clamp(20px, 5vw, 32px);
      background:white;
      border:2px solid #ffc9dd;
      border-radius:12px;
      box-shadow:0 8px 18px rgba(204, 102, 153, 0.08);
      opacity:0;
      transform:translateY(10px);
      animation:fadeInUp 0.7s ease-out 0.1s forwards;
    }

    @media (max-width:480px){
      .wrapper{
        width:94%;
        margin:16px auto;
        padding:24px 20px;
      }
    }

    .fade-in{
      opacity:0;
      transform:translateY(6px);
      animation:fadeInUp 0.6s ease-out forwards;
    }
    .delay-1{ animation-delay:0.15s; }
    .delay-2{ animation-delay:0.30s; }
    .delay-3{ animation-delay:0.45s; }

    @keyframes fadeInUp{
      from{ opacity:0; transform:translateY(10px); }
      to{ opacity:1; transform:translateY(0); }
    }

    h1{
      border-bottom:10px solid #ffc9dd;
      padding-bottom:8px;
      margin-top:0;
      font-size:clamp(22px, 6vw, 32px);
      color:#333;
    }

    .question{
      font-size:clamp(18px, 4.5vw, 24px);
      color:#555;
      margin:1.5em 0 2em 0;
      line-height:1.6;
      font-weight:bold;
    }

    .answer-buttons{
      display:flex;
      gap:clamp(16px, 4vw, 24px);
      justify-content:center;
      flex-wrap:wrap;
      margin:2em 0;
    }

    .answer-btn{
      flex:1;
      min-width:120px;
      max-width:200px;
      padding:clamp(16px, 4vw, 20px);
      min-height:60px;
      line-height:1.4;
      display:inline-flex;
      align-items:center;
      justify-content:center;
      text-decoration:none;
      color:#cc6699;
      font-size:clamp(16px, 4vw, 20px);
      font-weight:bold;
      border-radius:999px;
      border:2px solid #ffc9dd;
      background:#ffffff;
      box-shadow:0 2px 6px rgba(204, 102, 153, 0.06);
      transition:transform 0.15s ease-out, box-shadow 0.15s ease-out, background 0.15s ease-out, border-color 0.15s ease-out;
      -webkit-tap-highlight-color:transparent;
      cursor:pointer;
    }

    .answer-btn:hover,
    .answer-btn:active{
      transform:translateY(-2px);
      box-shadow:0 6px 12px rgba(204, 102, 153, 0.14);
      background:#fff5fa;
      border-color:#cc6699;
    }

    .answer-btn.yes{
      background:#fff0f5;
      border-color:#ff69b4;
      color:#ff1493;
    }

    .answer-btn.no{
      background:#f0f8ff;
      border-color:#87ceeb;
      color:#4682b4;
    }

    .answer-btn.yes:hover,
    .answer-btn.yes:active{
      background:#ffe0f0;
      border-color:#ff1493;
    }

    .answer-btn.no:hover,
    .answer-btn.no:active{
      background:#e0f0ff;
      border-color:#4682b4;
    }

    .result{
      margin-top:2em;
      padding:1.5em;
      background:#f8f8ff;
      border:1px solid #e6e6fa;
      border-radius:8px;
      font-size:clamp(16px, 4vw, 18px);
      color:#666;
      opacity:0;
      transform:translateY(10px);
      transition:all 0.3s ease-out;
    }

    .result.show{
      opacity:1;
      transform:translateY(0);
    }

    .typewriter-cursor::after {
      content: "|";
      animation: blink 0.7s step-end infinite;
    }
    @keyframes blink {
      50% { opacity: 0; }
    }
  </style>
  <title>質問画面</title>
</head>
<body>
  <div class="loader-overlay" id="loader">
    <div class="loader-spinner"></div>
    <p class="loader-text">読み込み中...</p>
  </div>

  <div class="main-content" id="main">
    <div class="wrapper">
      <h1 id="title" class="fade-in typewriter-cursor"></h1>
      <p id="question" class="fade-in delay-1 question typewriter-cursor"></p>
      
      <div class="answer-buttons fade-in delay-2">
        <button class="answer-btn yes" id="yesBtn" onclick="handleAnswer('yes')">はい</button>
        <button class="answer-btn no" id="noBtn" onclick="handleAnswer('no')">いいえ</button>
      </div>

      <div id="result" class="result"></div>
    </div>
  </div>

  <script>
    (function () {
      var loader = document.getElementById('loader');
      var main = document.getElementById('main');
      setTimeout(function(){
        loader.classList.add('hide');
        main.classList.add('show');
        
        var titleText = "質問です。";
        var questionText = "あなたは15歳以上ですか？";
        var speed = 80;

        function typeWriter(el, text, delay, callback) {
          el.textContent = "";
          el.classList.add("typewriter-cursor");
          var i = 0;
          function type() {
            if (i < text.length) {
              el.textContent += text.charAt(i);
              i++;
              setTimeout(type, speed);
            } else {
              el.classList.remove("typewriter-cursor");
              if (callback) setTimeout(callback, 300);
            }
          }
          setTimeout(type, delay);
        }

        typeWriter(document.getElementById("title"), titleText, 0, function () {
          typeWriter(document.getElementById("question"), questionText, 0);
        });
      }, 600);
    })();

    function handleAnswer(answer) {
      var resultDiv = document.getElementById('result');
      var yesBtn = document.getElementById('yesBtn');
      var noBtn = document.getElementById('noBtn');
      
      // ボタンを無効化
      yesBtn.disabled = true;
      noBtn.disabled = true;
      
      // 選択されたボタンを強調
      if (answer === 'yes') {
        yesBtn.style.transform = 'scale(1.05)';
        yesBtn.style.boxShadow = '0 8px 16px rgba(255, 20, 147, 0.3)';
        resultDiv.textContent = 'へぇーそうなんだ';
        resultDiv.style.borderColor = '#ff69b4';
        resultDiv.style.background = '#fff0f5';
        
        // 1秒後にリンク先へ移動
        setTimeout(function() {
          window.location.href = '/tunsira/ie.html';
        }, 1000);
      } else {
        noBtn.style.transform = 'scale(1.05)';
        noBtn.style.boxShadow = '0 8px 16px rgba(70, 130, 180, 0.3)';
        resultDiv.textContent = 'お、おう';
        resultDiv.style.borderColor = '#87ceeb';
        resultDiv.style.background = '#f0f8ff';
        
        // 1秒後にリンク先へ移動
        setTimeout(function() {
          window.location.href = '/tunsira';
        }, 1000);
      }
      
      // 結果を表示
      resultDiv.classList.add('show');
    }
  </script>
</body>
</html>
